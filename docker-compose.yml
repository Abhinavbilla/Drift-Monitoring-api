services:
  api:
    build: .
    container_name: drift-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - COOKIE_KEY=${COOKIE_KEY}
      - API_KEY=${API_KEY}
    volumes:
      - ./data:/app/data
      - ./drift.db:/app/drift.db
      - ./google_credentials.json:/app/google_credentials.json
    restart: unless-stopped

  dashboard:
    build: .
    container_name: drift-dashboard
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0 --server.enableCORS false --server.enableXsrfProtection false
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - COOKIE_KEY=${COOKIE_KEY}
      - API_KEY=${API_KEY}
    volumes:
      - ./data:/app/data
      - ./drift.db:/app/drift.db
      - ./google_credentials.json:/app/google_credentials.json   # Needed for streamlit-google-auth
    restart: unless-stopped